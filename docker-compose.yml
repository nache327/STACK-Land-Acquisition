version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zoning
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zoning"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/zoning
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REGRID_API_KEY: ${REGRID_API_KEY:-}
      FEMA_NFHL_URL: ${FEMA_NFHL_URL:-https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer}
      USFWS_NWI_URL: ${USFWS_NWI_URL:-https://www.fws.gov/wetlandsmapservice/services/Wetlands/MapServer}
      USGS_3DEP_DEM_URL: ${USGS_3DEP_DEM_URL:-https://elevation.nationalmap.gov/arcgis/rest/services/3DEPElevation/ImageServer}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  tileserv:
    image: pramsey/pg_tileserv:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/zoning
    ports:
      - "7800:7800"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
