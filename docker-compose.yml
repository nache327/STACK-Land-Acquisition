version: "3.9"

# Postgres is intentionally NOT defined here. Supabase is the single source of
# truth for this system. Set DATABASE_URL in .env to your Supabase pooler URL.
#
# Redis is the only stateful service we run locally for the Dramatiq queue.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      REDIS_URL: ${REDIS_URL:?REDIS_URL must be set in .env}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REGRID_API_KEY: ${REGRID_API_KEY:-}
      FEMA_NFHL_URL: ${FEMA_NFHL_URL:-https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer}
      USFWS_NWI_URL: ${USFWS_NWI_URL:-https://www.fws.gov/wetlandsmapservice/services/Wetlands/MapServer}
      USGS_3DEP_DEM_URL: ${USGS_3DEP_DEM_URL:-https://elevation.nationalmap.gov/arcgis/rest/services/3DEPElevation/ImageServer}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      REDIS_URL: ${REDIS_URL:?REDIS_URL must be set in .env}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REGRID_API_KEY: ${REGRID_API_KEY:-}
      FEMA_NFHL_URL: ${FEMA_NFHL_URL:-https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer}
      USFWS_NWI_URL: ${USFWS_NWI_URL:-https://www.fws.gov/wetlandsmapservice/services/Wetlands/MapServer}
      USGS_3DEP_DEM_URL: ${USGS_3DEP_DEM_URL:-https://elevation.nationalmap.gov/arcgis/rest/services/3DEPElevation/ImageServer}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: dramatiq app.worker --processes 1 --threads 2
