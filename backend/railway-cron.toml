# Railway service config — daily-digest + queued-job watchdog crons
#
# This file is consumed by a separate Railway service (NOT the web
# or worker service). Set the service's Config Path to
# `backend/railway-cron.toml` in the Railway dashboard.
#
# Daily digest remains production-required. The watchdog exits 1 when
# non-terminal jobs have been queued for more than 10 minutes, limited
# to jobs queued within the last 7 days.

[build]
builder = "NIXPACKS"
buildCommand = "pip install --no-cache-dir -e ."

[deploy]
# Never auto-restart — the script is a one-shot. Restart-on-fail
# would create repeated failure loops while stuck jobs remain present.
restartPolicyType = "NEVER"
crons = [
  { name = "daily-digest", startCommand = "python -m app.workers.daily_email", cronSchedule = "0 12 * * *" },
  { name = "queued-job-watchdog", startCommand = "python scripts/queued_job_watchdog.py", cronSchedule = "*/5 * * * *" },
]
