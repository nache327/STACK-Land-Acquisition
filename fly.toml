# Fly.io configuration for the Zoning Finder FastAPI backend.
# Deploy: fly deploy  (from the zoning-finder root directory)
#
# Required secrets (set with `fly secrets set KEY=value`):
#   DATABASE_URL          postgresql+asyncpg://user:pass@host/db
#   ANTHROPIC_API_KEY     sk-ant-...

app = "zoning-finder-api"
primary_region = "den"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
